<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andev Web</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">
    <div class="wrapper">
        <form id="loginForm">
            <h2>Login</h2>
            <div class="input-field">
                <input type="text" id="loginEmail" required>
                <label>Enter your email</label>
            </div>
            <div class="input-field">
                <input type="password" id="loginPassword" required>
                <label>Enter your password</label>
            </div>
            <div class="forget">
                <label for="remember">
                    <input type="checkbox" id="remember">
                    <p>Remember me</p>
                </label>
                <a href="#" id="forgotPasswordLink">Forgot password?</a>
            </div>
            <button type="submit" id="loginButton">Log In</button> <!-- Added ID for login button -->
            <div class="register">
                <p>Don't have an account? <a href="register.html" id="registerLink">Register</a></p>
            </div>
        </form>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span> <!-- Added ID for close button -->

            <p>Enter your email to reset your password.</p>
